<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Daily Planner</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Planner">
<meta name="theme-color" content="#185FA5">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23185FA5'/><rect x='14' y='18' width='24' height='4' rx='2' fill='white'/><rect x='14' y='26' width='36' height='4' rx='2' fill='white' opacity='0.7'/><rect x='14' y='34' width='30' height='4' rx='2' fill='white' opacity='0.7'/><rect x='14' y='42' width='20' height='4' rx='2' fill='white' opacity='0.5'/></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gap:8px;--pad:14px;
  --color-bg:#E0EEF8;
  --color-bg2:#EDF5FC;
  --color-bg3:#B5D4F4;
  --color-surface:#ffffff;
  --color-text:#0C447C;
  --color-text2:#185FA5;
  --color-text3:#378ADD;
  --color-border:#B5D4F4;
  --color-border2:#85B7EB;
  --color-accent:#185FA5;
  --color-accent2:#0C447C;
  --radius-md:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--color-bg);color:var(--color-text);min-height:100vh;padding:1rem;padding-bottom:80px}
.planner{max-width:720px;margin:0 auto;padding:0.5rem 0}

/* Settings bar */
.settings-bar{display:flex;align-items:center;gap:var(--gap);padding:10px var(--pad);background:linear-gradient(135deg,#EDF5FC,#E0EEF8);border-radius:var(--radius-lg);border:0.5px solid var(--color-border);margin-bottom:0.75rem;flex-wrap:wrap}
.settings-bar label{font-size:13px;color:var(--color-accent);font-weight:500}
.settings-bar input[type=text]{font-size:13px;padding:4px 8px;border:0.5px solid var(--color-border);border-radius:var(--radius-md);background:#fff;color:var(--color-text);width:110px}
.settings-bar select{font-size:13px;padding:4px 8px;border:0.5px solid var(--color-border);border-radius:var(--radius-md);background:#fff;color:var(--color-text)}
.new-page-btn{margin-left:auto;display:flex;align-items:center;gap:5px;padding:7px 14px;border:none;border-radius:var(--radius-md);background:var(--color-accent);color:#fff;cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap}
.new-page-btn:hover{background:var(--color-accent2)}

/* Sync bar */
.sync-bar{display:flex;align-items:center;gap:var(--gap);padding:7px var(--pad);background:var(--color-bg2);border-radius:var(--radius-lg);border:0.5px solid var(--color-border);margin-bottom:0.75rem;flex-wrap:wrap;font-size:12px;color:var(--color-text2)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0;transition:background 0.3s}
.sync-dot.synced{background:#1D9E75}
.sync-dot.syncing{background:#F5A623;animation:pulse 1s infinite}
.sync-dot.error{background:#A32D2D}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* Data bar */
.data-bar{display:flex;align-items:center;gap:var(--gap);padding:8px var(--pad);background:var(--color-surface);border-radius:var(--radius-lg);border:0.5px solid var(--color-border);margin-bottom:1rem;flex-wrap:wrap}
.data-bar-label{font-size:12px;color:var(--color-text3);font-weight:500;margin-right:4px}
.data-btn{display:flex;align-items:center;gap:4px;font-size:12px;padding:4px 10px;border:0.5px solid var(--color-border2);border-radius:var(--radius-md);background:var(--color-bg2);color:var(--color-text2);cursor:pointer;white-space:nowrap}
.data-btn:hover{background:var(--color-bg3);color:var(--color-text)}
.data-btn.export{border-color:var(--color-border);color:var(--color-accent);background:var(--color-bg2)}
.data-btn.import{border-color:#C0DD97;color:#3B6D11;background:#EAF3DE}
.data-btn.import:hover{background:#C0DD97}
.data-btn.clear{border-color:#F7C1C1;color:#791F1F;background:#FCEBEB}
.data-btn.clear:hover{background:#F7C1C1}
.data-btn.sync{border-color:#AFA9EC;color:#3C3489;background:#EEEDFE}
.data-btn.sync:hover{background:#AFA9EC}

/* Panels */
.panels-container{display:flex;flex-direction:column;gap:1rem}
.panel{border-radius:var(--radius-lg);overflow:hidden;box-shadow:0 2px 8px rgba(24,95,165,0.10)}
.panel.archived{opacity:0.72}
.panel-header{display:flex;align-items:center;gap:8px;padding:10px var(--pad);flex-wrap:wrap;color:#fff}
.panel-date{font-size:14px;font-weight:500}
.panel-user{font-size:12px;display:flex;align-items:center;gap:3px;opacity:0.85}
.panel-progress{font-size:12px;opacity:0.8;margin-left:2px}
.panel-badge{font-size:11px;padding:2px 8px;border-radius:var(--radius-md);font-weight:500}
.badge-active{background:rgba(255,255,255,0.3)}
.badge-arch{background:rgba(0,0,0,0.15)}
.panel-toggle{margin-left:auto;background:rgba(255,255,255,0.25);border:none;cursor:pointer;font-size:16px;padding:4px 7px;line-height:1;border-radius:var(--radius-md);color:#fff;flex-shrink:0}
.panel-toggle:hover{background:rgba(255,255,255,0.45)}
.panel-body{padding:var(--pad);background:var(--color-surface);border:0.5px solid var(--color-border);border-top:none;border-radius:0 0 var(--radius-lg) var(--radius-lg)}

/* Add task row — category FIRST */
.add-task-row{display:flex;gap:var(--gap);margin-bottom:10px;flex-wrap:nowrap;position:relative;align-items:center}
.cat-select-btn{font-size:12px;padding:7px 10px;border:0.5px solid var(--color-border2);border-radius:var(--radius-md);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px;flex-shrink:0}
.cat-select-btn:hover{filter:brightness(0.93)}
.add-task-row input[type=text]{flex:1;min-width:80px;font-size:14px;padding:7px 10px;border:0.5px solid var(--color-border2);border-radius:var(--radius-md);background:var(--color-surface);color:var(--color-text)}
.add-btn{padding:7px 14px;border:none;border-radius:var(--radius-md);background:var(--color-accent);color:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:4px;white-space:nowrap;font-weight:500;flex-shrink:0}
.add-btn:hover{background:var(--color-accent2)}

/* Tasks */
.tasks-list{display:flex;flex-direction:column;gap:6px}
.task-item{border-radius:var(--radius-md);overflow:visible;border:0.5px solid var(--color-border);background:var(--color-bg2)}
.task-item.done{background:var(--color-bg);border-color:transparent}
.task-row{display:flex;align-items:center;gap:7px;padding:9px 10px;position:relative}
.task-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--color-border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;background:var(--color-surface);transition:all 0.15s}
.task-check.checked{background:#1D9E75;border-color:#1D9E75;color:#fff}
.task-text{flex:1;font-size:14px;color:var(--color-text);word-break:break-word;min-width:0;line-height:1.4}
.task-item.done .task-text{text-decoration:line-through;color:#5DCAA5;font-style:italic}
.task-edit-input{flex:1;font-size:14px;padding:2px 6px;border:0.5px solid var(--color-accent);border-radius:var(--radius-md);background:var(--color-surface);color:var(--color-text);min-width:0;outline:none}
.cat-pill{font-size:11px;padding:3px 8px;border-radius:var(--radius-md);font-weight:500;flex-shrink:0;white-space:nowrap;cursor:pointer;border:0.5px solid transparent}
.cat-pill:hover{filter:brightness(0.92)}
.edit-task-btn{background:none;border:none;cursor:pointer;color:var(--color-text3);font-size:14px;padding:3px;line-height:1;flex-shrink:0;opacity:0.6}
.edit-task-btn:hover{opacity:1;color:var(--color-accent)}
.sub-toggle-btn{display:flex;align-items:center;gap:3px;font-size:11px;padding:3px 7px;border-radius:var(--radius-md);border:0.5px solid var(--color-border2);background:var(--color-bg2);color:var(--color-text2);cursor:pointer;white-space:nowrap;flex-shrink:0}
.sub-toggle-btn:hover{background:var(--color-bg3)}
.sub-toggle-btn.has-subs{background:#EEEDFE;border-color:#AFA9EC;color:#3C3489}
.del-btn{background:none;border:none;cursor:pointer;color:var(--color-text3);font-size:15px;padding:3px;line-height:1;flex-shrink:0;opacity:0.6}
.del-btn:hover{color:#A32D2D;opacity:1}

/* Subtasks */
.subtasks{padding:6px 10px 8px 38px;display:flex;flex-direction:column;gap:4px;border-top:0.5px solid var(--color-border);background:var(--color-bg);border-radius:0 0 var(--radius-md) var(--radius-md)}
.subtask-row{display:flex;align-items:center;gap:7px}
.subtask-check{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--color-border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;background:var(--color-surface)}
.subtask-check.checked{background:#5DCAA5;border-color:#5DCAA5;color:#fff}
.subtask-text{flex:1;font-size:13px;color:var(--color-text2);word-break:break-word}
.subtask-text.done{text-decoration:line-through;color:#9FE1CB}
.subtask-del{background:none;border:none;cursor:pointer;color:var(--color-text3);font-size:13px;padding:1px;opacity:0.5}
.subtask-del:hover{opacity:1;color:#A32D2D}
.add-subtask-row{display:flex;gap:5px;margin-top:6px}
.add-subtask-row input{flex:1;font-size:12px;padding:4px 8px;border:0.5px solid var(--color-border2);border-radius:var(--radius-md);background:var(--color-surface);color:var(--color-text);min-width:0}
.add-subtask-btn{font-size:12px;padding:4px 10px;border:none;border-radius:var(--radius-md);background:#5DCAA5;color:#085041;cursor:pointer;font-weight:500;white-space:nowrap}
.add-subtask-btn:hover{background:#1D9E75;color:#fff}
.sub-count{font-size:11px;color:var(--color-text3);margin-top:3px}

/* Category picker overlay */
.cat-picker-overlay{position:fixed;z-index:1000;background:var(--color-surface);border:0.5px solid var(--color-border2);border-radius:var(--radius-md);padding:6px;display:flex;flex-direction:column;gap:3px;box-shadow:0 4px 20px rgba(24,95,165,0.18);min-width:160px}
.cat-picker-option{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:var(--radius-md);cursor:pointer;font-size:13px;font-weight:500;color:var(--color-text)}
.cat-picker-option:hover{background:var(--color-bg2)}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Categories popup */
.cats-popup-overlay{position:fixed;inset:0;background:rgba(12,68,124,0.25);z-index:500;display:none;align-items:flex-end;justify-content:center}
.cats-popup-overlay.open{display:flex}
.cats-popup{background:var(--color-surface);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:var(--pad);width:100%;max-width:720px;max-height:80vh;overflow-y:auto;border:0.5px solid var(--color-border)}
.cats-popup-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cats-popup-title{font-size:14px;font-weight:500;color:var(--color-text)}
.cats-popup-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--color-text3);line-height:1;padding:2px}
.cats-popup-close:hover{color:var(--color-text)}
.cat-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.cat-tag{display:flex;align-items:center;gap:4px;font-size:12px;padding:4px 10px;border-radius:var(--radius-md);font-weight:500;border:0.5px solid transparent}
.cat-tag-name{cursor:pointer;border-bottom:1px dashed transparent;transition:border-color 0.15s}
.cat-tag-name:hover{border-bottom-color:currentColor}
.cat-tag-input{font-size:12px;font-weight:500;width:80px;border:none;border-bottom:1.5px solid currentColor;background:transparent;color:inherit;outline:none;padding:0}
.cat-del{background:none;border:none;cursor:pointer;font-size:11px;padding:0;line-height:1;opacity:0.6}
.cat-del:hover{opacity:1}
.add-cat-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.add-cat-row input[type=text]{font-size:12px;padding:4px 8px;border:0.5px solid var(--color-border2);border-radius:var(--radius-md);background:var(--color-surface);color:var(--color-text);flex:1;min-width:80px}
.add-cat-row button{font-size:12px;padding:6px 12px;border:none;border-radius:var(--radius-md);background:var(--color-accent);color:#fff;cursor:pointer;display:flex;align-items:center;gap:3px;font-weight:500;white-space:nowrap}
.cats-trigger-btn{display:flex;align-items:center;gap:4px;font-size:12px;padding:5px 10px;border:0.5px solid var(--color-border2);border-radius:var(--radius-md);background:var(--color-bg2);color:var(--color-text2);cursor:pointer;margin-top:10px}
.cats-trigger-btn:hover{background:var(--color-bg3)}

/* Collapsed */
.collapsed .panel-body{display:none}

/* Empty state */
.empty-state{font-size:13px;color:var(--color-text3);text-align:center;padding:16px 0;font-style:italic}

/* Toast */
.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:#1D9E75;color:#fff;padding:8px 18px;border-radius:var(--radius-md);font-size:13px;font-weight:500;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:2000}
.toast.show{opacity:1}

/* Mobile FAB — add task */
.fab{display:none;position:fixed;bottom:1.5rem;right:1.5rem;z-index:400;width:52px;height:52px;border-radius:50%;background:var(--color-accent);color:#fff;border:none;cursor:pointer;font-size:24px;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(24,95,165,0.35)}
.fab:hover{background:var(--color-accent2)}
@media(max-width:600px){
  .fab{display:flex}
  .settings-bar input[type=text]{width:70px}
  .new-page-btn span{display:none}
  .task-row{padding:7px 8px;gap:5px}
  .panel-body{padding:10px}
  .data-bar{gap:5px}
  .add-task-row{flex-wrap:nowrap}
}
</style>
</head>
<body>
<div class="planner" id="top">
  <div class="settings-bar">
    <label>User</label>
    <input type="text" id="username" value="Ric" placeholder="Your name">
    <label>Page lasts</label>
    <select id="page-duration">
      <option value="1">1 day</option>
      <option value="2">2 days</option>
      <option value="3" selected>3 days</option>
      <option value="5">5 days</option>
      <option value="7">1 week</option>
    </select>
    <button class="new-page-btn" onclick="newPage()"><i class="ti ti-plus"></i> <span>New page</span></button>
  </div>

  <div class="sync-bar">
    <span class="sync-dot" id="sync-dot"></span>
    <span id="sync-status">Connecting to Google Sheets…</span>
    <button class="data-btn sync" style="margin-left:auto" onclick="syncNow()"><i class="ti ti-refresh" style="font-size:13px"></i> Sync now</button>
  </div>

  <div class="data-bar">
    <span class="data-bar-label"><i class="ti ti-database" style="font-size:13px;vertical-align:-1px"></i> Data</span>
    <button class="data-btn export" onclick="exportData()"><i class="ti ti-download" style="font-size:13px"></i> Export</button>
    <button class="data-btn import" onclick="document.getElementById('import-file').click()"><i class="ti ti-upload" style="font-size:13px"></i> Import</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    <button class="data-btn clear" onclick="clearData()"><i class="ti ti-trash" style="font-size:13px"></i> Clear all</button>
    <span style="margin-left:auto;font-size:11px;color:var(--color-text3)" id="last-saved"></span>
  </div>

  <div class="panels-container" id="panels"></div>
</div>

<!-- Categories popup -->
<div class="cats-popup-overlay" id="cats-overlay" onclick="closeCatsPopup(event)">
  <div class="cats-popup" id="cats-popup">
    <div class="cats-popup-header">
      <span class="cats-popup-title"><i class="ti ti-palette" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i> Manage categories</span>
      <button class="cats-popup-close" onclick="closeCatsPopupDirect()">&times;</button>
    </div>
    <div class="cat-tags" id="cat-tags-list"></div>
    <div class="add-cat-row">
      <input type="text" id="nc-name" placeholder="New category name" onkeydown="if(event.key==='Enter')addCat()">
      <button onclick="addCat()"><i class="ti ti-plus"></i> Add</button>
    </div>
  </div>
</div>

<!-- Mobile FAB -->
<button class="fab" onclick="scrollToTop()" title="Add task"><i class="ti ti-keyboard"></i></button>

<div class="toast" id="toast"></div>

<script>
const SHEETS_URL='https://script.google.com/macros/s/AKfycby9CXh1-_7q0KP7WIkc1HwUJmP_HZJSCguKnHDwuY4QyZEdfFMKFthZZoG14ASAzAlCKA/exec';

const PANEL_GRADIENTS=[
  'linear-gradient(135deg,#185FA5,#0F6E56)',
  'linear-gradient(135deg,#0C447C,#185FA5)',
  'linear-gradient(135deg,#0F6E56,#185FA5)',
  'linear-gradient(135deg,#185FA5,#534AB7)',
  'linear-gradient(135deg,#378ADD,#1D9E75)',
  'linear-gradient(135deg,#0C447C,#0F6E56)',
];

// 12 colours red→violet
const CAT_PALETTE=[
  '#E24B4A','#D85A30','#BA7517','#97C459',
  '#1D9E75','#378ADD','#185FA5','#534AB7',
  '#7F77DD','#993556','#D4537E','#993C1D'
];

let state={panels:[],cats:[{id:'c1',name:'Today',color:'#378ADD'}],nextId:2,gradIdx:0,catColorIdx:1};
let activePicker=null;
let syncTimer=null;

function scrollToTop(){
  document.getElementById('top').scrollIntoView({behavior:'smooth'});
  setTimeout(()=>{
    const activePanel=state.panels.find(p=>!p.archived);
    if(activePanel){
      const inp=document.getElementById('ti-'+activePanel.id);
      if(inp)inp.focus();
    }
  },400);
}

function setSyncStatus(status,msg){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-status');
  dot.className='sync-dot '+status;
  lbl.textContent=msg;
}

async function pushToSheets(){
  setSyncStatus('syncing','Saving to Google Sheets…');
  try{
    const rows=[['__STATE__',JSON.stringify(state)]];
    const resp=await fetch(SHEETS_URL,{method:'POST',body:JSON.stringify(rows)});
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const now=new Date();
    setSyncStatus('synced','Synced at '+now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}));
    const el=document.getElementById('last-saved');
    if(el)el.textContent='Saved '+now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  }catch(e){
    setSyncStatus('error','Sync failed — changes saved locally');
  }
}

async function pullFromSheets(){
  setSyncStatus('syncing','Loading from Google Sheets…');
  try{
    const resp=await fetch(SHEETS_URL+'?t='+Date.now());
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const rows=await resp.json();
    const stateRow=rows.find(r=>r[0]==='__STATE__');
    if(stateRow&&stateRow[1]){
      const remote=JSON.parse(stateRow[1]);
      if(remote&&remote.panels){
        state=remote;
        if(state.catColorIdx===undefined)state.catColorIdx=1;
        saveLocal();render();
        setSyncStatus('synced','Loaded from Google Sheets');
        return true;
      }
    }
    setSyncStatus('synced','No cloud data yet — pushing local state');
    await pushToSheets();
    return false;
  }catch(e){
    setSyncStatus('error','Could not reach Google Sheets — using local data');
    return false;
  }
}

function save(){
  saveLocal();
  clearTimeout(syncTimer);
  syncTimer=setTimeout(pushToSheets,2000);
}

function saveLocal(){
  try{localStorage.setItem('lcvp4',JSON.stringify(state));}catch(e){}
}

function syncNow(){clearTimeout(syncTimer);pullFromSheets();}

function load(){
  try{const d=localStorage.getItem('lcvp4');if(d){state=JSON.parse(d);if(state.catColorIdx===undefined)state.catColorIdx=1;}}catch(e){}
}

function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='planner-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();
  toast('Data exported');
}

function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const imported=JSON.parse(ev.target.result);
      if(!imported.panels||!imported.cats)throw new Error('Invalid');
      state=imported;if(state.catColorIdx===undefined)state.catColorIdx=1;
      save();render();toast('Data imported');
    }catch(err){toast('Import failed — invalid file','#A32D2D');}
    e.target.value='';
  };
  reader.readAsText(file);
}

function clearData(){
  if(!confirm('Clear all planner data? This cannot be undone.'))return;
  state={panels:[],cats:[{id:'c1',name:'Today',color:'#378ADD'}],nextId:2,gradIdx:0,catColorIdx:1};
  save();render();toast('All data cleared','#854F0B');
}

function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):s}

function toast(msg,col){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=col||'#1D9E75';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);
}

function fmt(iso){
  return new Date(iso).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}

function catStyle(catId){
  const c=state.cats.find(x=>x.id===catId)||state.cats[0];
  if(!c)return{bg:'#eee',text:'#555',border:'#bbb',name:'?',dot:'#999'};
  const hex=c.color;
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const lum=0.299*r+0.587*g+0.114*b;
  return{
    bg:'rgba('+r+','+g+','+b+',0.15)',
    text:lum>160?'rgb('+Math.max(0,r-80)+','+Math.max(0,g-80)+','+Math.max(0,b-80)+')':hex,
    border:'rgba('+r+','+g+','+b+',0.45)',
    name:c.name,dot:hex
  };
}

function newPage(){
  const user=cap(document.getElementById('username').value||'User');
  const grad=PANEL_GRADIENTS[state.gradIdx%PANEL_GRADIENTS.length];
  state.gradIdx=(state.gradIdx+1)%PANEL_GRADIENTS.length;
  const panel={id:state.nextId++,date:new Date().toISOString(),user,tasks:[],collapsed:false,archived:false,grad};
  let carriedCount=0;
  if(state.panels.length>0){
    const prev=state.panels[0];
    const carried=prev.tasks.filter(t=>!t.done).map(t=>({...t,id:state.nextId++,subtasks:(t.subtasks||[]).map(s=>({...s,id:state.nextId++}))}));
    panel.tasks=carried;carriedCount=carried.length;
    prev.archived=true;prev.collapsed=true;
  }
  state.panels.unshift(panel);
  save();render();
  toast('New page — '+carriedCount+' tasks carried forward');
}

function addTask(pid){
  const inp=document.getElementById('ti-'+pid);
  const text=cap(inp.value.trim());if(!text)return;
  const catId=document.getElementById('tc-sel-'+pid)?._catId||state.cats[0]?.id;
  const panel=state.panels.find(p=>p.id===pid);
  panel.tasks.push({id:state.nextId++,text,catId,done:false,subtasks:[],showSubs:false});
  inp.value='';save();renderTasksOnly(pid);
  document.getElementById('ti-'+pid)?.focus();
}

function renderTasksOnly(pid){
  const panel=state.panels.find(p=>p.id===pid);
  const container=document.getElementById('tl-'+pid);
  if(!container)return render();
  container.innerHTML=panel.tasks.length===0
    ?'<div class="empty-state">No tasks yet — type above and press Enter.</div>'
    :panel.tasks.map(t=>renderTask(panel,t)).join('');
}

function toggleTask(pid,tid){
  const t=state.panels.find(p=>p.id===pid).tasks.find(t=>t.id===tid);
  t.done=!t.done;save();renderTasksOnly(pid);
}

function deleteTask(pid,tid){
  const p=state.panels.find(p=>p.id===pid);
  p.tasks=p.tasks.filter(t=>t.id!==tid);save();renderTasksOnly(pid);
}

function startEditTask(pid,tid){
  const t=state.panels.find(p=>p.id===pid).tasks.find(t=>t.id===tid);
  const span=document.getElementById('tt-'+tid);
  if(!span)return;
  const inp=document.createElement('input');
  inp.className='task-edit-input';inp.value=t.text;
  inp.onblur=()=>{
    const val=inp.value.trim();
    if(val)t.text=cap(val);
    save();renderTasksOnly(pid);
  };
  inp.onkeydown=e=>{
    if(e.key==='Enter')inp.blur();
    if(e.key==='Escape'){inp.value=t.text;inp.blur();}
  };
  span.replaceWith(inp);inp.focus();inp.select();
}

function changeTaskCat(pid,tid,catId){
  const t=state.panels.find(p=>p.id===pid).tasks.find(t=>t.id===tid);
  t.catId=catId;save();closePicker();renderTasksOnly(pid);
}

function toggleSubs(pid,tid){
  const t=state.panels.find(p=>p.id===pid).tasks.find(t=>t.id===tid);
  t.showSubs=!t.showSubs;save();renderTasksOnly(pid);
}

function addSubtask(pid,tid){
  const inp=document.getElementById('si-'+tid);
  const text=cap(inp.value.trim());if(!text)return;
  const t=state.panels.find(p=>p.id===pid).tasks.find(t=>t.id===tid);
  t.subtasks.push({id:state.nextId++,text,done:false});
  inp.value='';save();renderTasksOnly(pid);
  document.getElementById('si-'+tid)?.focus();
}

function toggleSub(pid,tid,sid){
  const t=state.panels.find(p=>p.id===pid).tasks.find(t=>t.id===tid);
  t.subtasks.find(s=>s.id===sid).done^=true;save();renderTasksOnly(pid);
}

function deleteSub(pid,tid,sid){
  const t=state.panels.find(p=>p.id===pid).tasks.find(t=>t.id===tid);
  t.subtasks=t.subtasks.filter(s=>s.id!==sid);save();renderTasksOnly(pid);
}

function togglePanel(pid){
  const p=state.panels.find(p=>p.id===pid);p.collapsed=!p.collapsed;save();render();
}

// Pickers
function closePicker(){if(activePicker){activePicker.remove();activePicker=null;}}

function showPicker(items,anchorEl,onSelect){
  closePicker();
  const rect=anchorEl.getBoundingClientRect();
  const div=document.createElement('div');
  div.className='cat-picker-overlay';
  div.style.top=(rect.bottom+window.scrollY+4)+'px';
  div.style.left=(rect.left+window.scrollX)+'px';
  items.forEach(c=>{
    const opt=document.createElement('div');
    opt.className='cat-picker-option';
    opt.innerHTML='<span class="cat-dot" style="background:'+c.color+'"></span>'+c.name;
    opt.onclick=(e)=>{e.stopPropagation();onSelect(c.id);};
    div.appendChild(opt);
  });
  document.body.appendChild(div);activePicker=div;
  setTimeout(()=>document.addEventListener('click',closePicker,{once:true}),10);
}

function showCatPicker(pid,tid,btnEl){
  showPicker(state.cats,btnEl,(catId)=>changeTaskCat(pid,tid,catId));
}

function showAddCatPicker(pid,btnEl){
  showPicker(state.cats,btnEl,(catId)=>{
    const selBtn=document.getElementById('tc-sel-'+pid);
    if(selBtn){
      selBtn._catId=catId;
      const cs=catStyle(catId);
      selBtn.style.background=cs.bg;selBtn.style.color=cs.text;selBtn.style.borderColor=cs.border;
      selBtn.querySelector('span').textContent=cs.name;
    }
    closePicker();document.getElementById('ti-'+pid)?.focus();
  });
}

// Categories popup
function openCatsPopup(){
  renderCatTags();
  document.getElementById('cats-overlay').classList.add('open');
}

function closeCatsPopup(e){
  if(e.target===document.getElementById('cats-overlay'))closeCatsPopupDirect();
}

function closeCatsPopupDirect(){
  document.getElementById('cats-overlay').classList.remove('open');
}

function renderCatTags(){
  const container=document.getElementById('cat-tags-list');
  container.innerHTML=state.cats.map(c=>{
    const cs=catStyle(c.id);
    return '<div class="cat-tag" style="background:'+cs.bg+';color:'+cs.text+';border-color:'+cs.border+'">'
      +'<span class="cat-dot" style="background:'+c.color+'"></span>'
      +'<span class="cat-tag-name" id="cpname-'+c.id+'" onclick="startRename(\''+c.id+'\')" style="color:'+cs.text+'" title="Click to rename">'+c.name+'</span>'
      +(state.cats.length>1?'<button class="cat-del" onclick="deleteCat(\''+c.id+'\')">&#x2715;</button>':'')
      +'</div>';
  }).join('');
}

function startRename(catId){
  const span=document.getElementById('cpname-'+catId);
  const cat=state.cats.find(c=>c.id===catId);
  if(!span||!cat)return;
  const inp=document.createElement('input');
  inp.className='cat-tag-input';inp.value=cat.name;inp.style.color=span.style.color;
  inp.onblur=()=>{if(inp.value.trim())cat.name=cap(inp.value.trim());save();renderCatTags();render();};
  inp.onkeydown=e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=cat.name;inp.blur();}};
  span.replaceWith(inp);inp.focus();inp.select();
}

function addCat(){
  const inp=document.getElementById('nc-name');
  const name=cap(inp.value.trim());if(!name)return;
  const color=CAT_PALETTE[state.catColorIdx%CAT_PALETTE.length];
  state.catColorIdx=(state.catColorIdx+1)%CAT_PALETTE.length;
  state.cats.push({id:'c'+state.nextId++,name,color});
  inp.value='';save();renderCatTags();render();
  toast('Category added');
}

function deleteCat(catId){
  if(state.cats.length<=1){toast('Cannot delete the last category','#854F0B');return;}
  if(!confirm('Delete this category?'))return;
  state.cats=state.cats.filter(c=>c.id!==catId);
  save();renderCatTags();render();
}

// Render
function renderTask(panel,task){
  const cs=catStyle(task.catId);
  const done=task.done;
  const subs=task.subtasks||[];
  const subDone=subs.filter(s=>s.done).length;
  const hasSubs=subs.length>0;

  let h='<div class="task-item'+(done?' done':'')+'" id="tk-'+task.id+'">'
    +'<div class="task-row">'
    +'<div class="task-check'+(done?' checked':'')+'" onclick="toggleTask('+panel.id+','+task.id+')">'+(done?'<i class="ti ti-check"></i>':'')+'</div>'
    +'<span class="task-text" id="tt-'+task.id+'">'+(done?'<s>'+task.text+'</s>':task.text)+'</span>';

  if(!panel.archived){
    h+='<span class="cat-pill" style="background:'+cs.bg+';color:'+cs.text+';border-color:'+cs.border+'" onclick="showCatPicker('+panel.id+','+task.id+',this)" title="Change category">'+cs.name+'</span>'
      +'<button class="edit-task-btn" onclick="startEditTask('+panel.id+','+task.id+')" title="Rename task"><i class="ti ti-pencil"></i></button>'
      +'<button class="sub-toggle-btn'+(hasSubs?' has-subs':'')+'" onclick="toggleSubs('+panel.id+','+task.id+')" title="Subtasks">'
      +'<i class="ti ti-'+(task.showSubs?'chevron-up':'subtask')+'"></i>'
      +(hasSubs?subDone+'/'+subs.length:'+ sub')
      +'</button>'
      +'<button class="del-btn" onclick="deleteTask('+panel.id+','+task.id+')" title="Delete"><i class="ti ti-trash"></i></button>';
  } else {
    h+='<span class="cat-pill" style="background:'+cs.bg+';color:'+cs.text+';border-color:'+cs.border+'">'+cs.name+'</span>';
  }

  h+='</div>';

  if(task.showSubs||hasSubs){
    h+='<div class="subtasks">';
    subs.forEach(s=>{
      h+='<div class="subtask-row">'
        +'<div class="subtask-check'+(s.done?' checked':'')+'" onclick="toggleSub('+panel.id+','+task.id+','+s.id+')">'+(s.done?'<i class="ti ti-check"></i>':'')+'</div>'
        +'<span class="subtask-text'+(s.done?' done':'')+'">'+s.text+'</span>'
        +(!panel.archived?'<button class="subtask-del" onclick="deleteSub('+panel.id+','+task.id+','+s.id+')" title="Delete subtask"><i class="ti ti-x"></i></button>':'')
        +'</div>';
    });
    if(!panel.archived&&task.showSubs){
      h+='<div class="add-subtask-row">'
        +'<input type="text" id="si-'+task.id+'" placeholder="Add subtask\u2026" onkeydown="if(event.key===\'Enter\')addSubtask('+panel.id+','+task.id+')">'
        +'<button class="add-subtask-btn" onclick="addSubtask('+panel.id+','+task.id+')"><i class="ti ti-plus"></i> Add</button>'
        +'</div>';
    }
    if(hasSubs)h+='<div class="sub-count">'+subDone+' of '+subs.length+' subtasks complete</div>';
    h+='</div>';
  }
  h+='</div>';
  return h;
}

function render(){
  const container=document.getElementById('panels');
  if(state.panels.length===0){
    container.innerHTML='<div class="empty-state" style="padding:2rem 0">Click "New page" to begin.</div>';
    return;
  }

  container.innerHTML=state.panels.map(panel=>{
    const done=panel.tasks.filter(t=>t.done).length;
    const total=panel.tasks.length;
    const active=!panel.archived;
    const grad=panel.grad||PANEL_GRADIENTS[0];
    const firstCat=state.cats[0];
    const firstCs=catStyle(firstCat?.id);

    return '<div class="panel'+(panel.archived?' archived':'')+(panel.collapsed?' collapsed':'')+'" id="pnl-'+panel.id+'">'
      +'<div class="panel-header" style="background:'+grad+'">'
      +'<span class="panel-date">'+fmt(panel.date)+'</span>'
      +'<span class="panel-user"><i class="ti ti-user" style="font-size:12px"></i> '+panel.user+'</span>'
      +(total>0?'<span class="panel-progress">'+done+'/'+total+' done</span>':'')
      +'<span class="panel-badge '+(active?'badge-active':'badge-arch')+'">'+(active?'active':'archived')+'</span>'
      +'<button class="panel-toggle" onclick="togglePanel('+panel.id+')">'
      +'<i class="ti ti-chevron-'+(panel.collapsed?'down':'up')+'"></i></button>'
      +'</div>'
      +'<div class="panel-body">'
      +(active
        ? '<div class="add-task-row">'
          +'<button class="cat-select-btn" id="tc-sel-'+panel.id+'" style="background:'+firstCs.bg+';color:'+firstCs.text+';border-color:'+firstCs.border+'" onclick="showAddCatPicker('+panel.id+',this)">'
          +'<i class="ti ti-tag" style="font-size:13px"></i><span>'+firstCs.name+'</span></button>'
          +'<input type="text" id="ti-'+panel.id+'" placeholder="Add a task\u2026" onkeydown="if(event.key===\'Enter\')addTask('+panel.id+')">'
          +'<button class="add-btn" onclick="addTask('+panel.id+')"><i class="ti ti-plus"></i> Add</button>'
          +'</div>'
        : '')
      +'<div class="tasks-list" id="tl-'+panel.id+'">'
      +(panel.tasks.length===0
        ?'<div class="empty-state">No tasks yet'+(active?' \u2014 type above and press Enter.':'.')+'</div>'
        :panel.tasks.map(t=>renderTask(panel,t)).join(''))
      +'</div>'
      +(active
        ?'<button class="cats-trigger-btn" onclick="openCatsPopup()"><i class="ti ti-palette" style="font-size:13px"></i> Manage categories</button>'
        :'')
      +'</div></div>';
  }).join('');

  state.panels.forEach(panel=>{
    const btn=document.getElementById('tc-sel-'+panel.id);
    if(btn&&!btn._catId)btn._catId=state.cats[0]?.id;
  });
}

// PWA Service Worker
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

// Boot
load();render();
pullFromSheets().then(loaded=>{
  if(!loaded&&state.panels.length===0)newPage();
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Daily Planner</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Planner">
<meta name="theme-color" content="#185FA5">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="ladybug.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gap:8px;--pad:14px;
  --color-bg:#E0EEF8;--color-bg2:#EDF5FC;--color-bg3:#B5D4F4;
  --color-surface:#ffffff;--color-text:#0C447C;--color-text2:#185FA5;--color-text3:#378ADD;
  --color-border:#B5D4F4;--color-border2:#85B7EB;--color-accent:#185FA5;--color-accent2:#0C447C;
  --color-databar:#D4E8F7;--radius-md:8px;--radius-lg:12px;--focus-width:380px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--color-bg);color:var(--color-text);min-height:100vh;padding:1rem;padding-bottom:80px}
.app-layout{display:flex;gap:1rem;max-width:1200px;margin:0 auto;align-items:flex-start}
.planner-col{flex:1;min-width:0;padding:0.5rem 0}
.focus-col{width:var(--focus-width);flex-shrink:0;position:sticky;top:1rem;max-height:calc(100vh - 2rem);display:none;flex-direction:column;background:var(--color-surface);border-radius:var(--radius-lg);border:0.5px solid var(--color-border);box-shadow:0 4px 20px rgba(24,95,165,0.12);overflow:hidden}
.focus-col.open{display:flex}
@media(max-width:900px){.focus-col{display:none!important}.split-toggle{display:none!important}}
.title-bar{display:flex;align-items:center;gap:10px;padding:8px var(--pad);background:var(--color-accent);border-radius:var(--radius-lg);margin-bottom:0.75rem;color:#fff}
.title-bar-icon{width:28px;height:28px;flex-shrink:0;border-radius:4px}
.title-bar-name{font-size:15px;font-weight:700;letter-spacing:0.08em;flex-shrink:0}
.title-bar-date{font-size:13px;opacity:0.85;margin-left:4px}
.title-bar-spacer{flex:1}
.title-bar-save{font-size:11px;opacity:0.7;white-space:nowrap}
.settings-bar{display:flex;align-items:center;gap:var(--gap);padding:10px var(--pad);background:linear-gradient(135deg,#EDF5FC,#E0EEF8);border-radius:var(--radius-lg);border:0.5px solid var(--color-border);margin-bottom:0.75rem;flex-wrap:wrap}
.settings-bar label{font-size:13px;color:var(--color-accent);font-weight:500}
.settings-bar input[type=text]{font-size:13px;padding:4px 8px;border:0.5px solid var(--color-border);border-radius:var(--radius-md);background:#fff;color:var(--color-text);width:110px}
.settings-bar select{font-size:13px;padding:4px 8px;border:0.5px solid var(--color-border);border-radius:var(--radius-md);background:#fff;color:var(--color-text)}
.new-page-btn{display:flex;align-items:center;gap:5px;padding:7px 14px;border:none;border-radius:var(--radius-md);background:var(--color-accent);color:#fff;cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap}
.new-page-btn:hover{background:var(--color-accent2)}
.split-toggle{display:flex;align-items:center;gap:5px;padding:7px 12px;border:0.5px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-bg2);color:var(--color-text2);cursor:pointer;font-size:13px;white-space:nowrap}
.split-toggle.active{background:var(--color-accent);color:#fff;border-color:var(--color-accent)}
.split-toggle:hover{background:var(--color-bg3)}
.split-toggle.active:hover{background:var(--color-accent2)}
.sync-bar{display:flex;align-items:center;gap:var(--gap);padding:7px var(--pad);background:var(--color-bg2);border-radius:var(--radius-lg);border:0.5px solid var(--color-border);margin-bottom:0.75rem;font-size:12px;color:var(--color-text2)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0;transition:background 0.3s}
.sync-dot.synced{background:#1D9E75}
.sync-dot.syncing{background:#F5A623;animation:pulse 1s infinite}
.sync-dot.error{background:#A32D2D}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.data-bar{display:flex;align-items:center;gap:var(--gap);padding:8px var(--pad);background:var(--color-databar);border-radius:var(--radius-lg);border:0.5px solid var(--color-border2);margin-bottom:1rem;flex-wrap:wrap}
.data-bar-label{font-size:12px;color:var(--color-accent2);font-weight:500;margin-right:4px}
.data-btn{display:flex;align-items:center;gap:4px;font-size:12px;padding:4px 10px;border:0.5px solid var(--color-border2);border-radius:var(--radius-md);background:var(--color-bg2);color:var(--color-text2);cursor:pointer;white-space:nowrap}
.data-btn:hover{background:var(--color-bg3)}
.data-btn.export{border-color:var(--color-border2);color:var(--color-accent);background:#fff}
.data-btn.import{border-color:#C0DD97;color:#3B6D11;background:#EAF3DE}
.data-btn.import:hover{background:#C0DD97}
.data-btn.clear{border-color:#F7C1C1;color:#791F1F;background:#FCEBEB}
.data-btn.clear:hover{background:#F7C1C1}
.data-btn.sync{border-color:#AFA9EC;color:#3C3489;background:#EEEDFE}
.data-btn.sync:hover{background:#AFA9EC}
.filter-bar{display:none;align-items:center;gap:var(--gap);padding:6px var(--pad);background:#EAF3DE;border-radius:var(--radius-md);margin-bottom:8px;font-size:12px;color:#3B6D11;border:0.5px solid #C0DD97}
.filter-bar.show{display:flex}
.filter-bar-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.clear-filter-btn{margin-left:auto;background:none;border:0.5px solid #3B6D11;color:#3B6D11;border-radius:var(--radius-md);padding:2px 8px;cursor:pointer;font-size:11px;display:flex;align-items:center;gap:3px}
.clear-filter-btn:hover{background:#C0DD97}
.panels-container{display:flex;flex-direction:column;gap:1rem}
.panel{border-radius:var(--radius-lg);overflow:hidden;box-shadow:0 2px 8px rgba(24,95,165,0.10)}
.panel.archived{opacity:0.72}
.panel-header{display:flex;align-items:center;gap:8px;padding:10px var(--pad);flex-wrap:wrap;color:#fff}
.panel-date{font-size:14px;font-weight:500}
.panel-user{font-size:12px;display:flex;align-items:center;gap:3px;opacity:0.85}
.panel-progress{font-size:12px;opacity:0.8;margin-left:2px}
.panel-badge{font-size:11px;padding:2px 8px;border-radius:var(--radius-md);font-weight:500}
.badge-active{background:rgba(255,255,255,0.3)}
.badge-arch{background:rgba(0,0,0,0.15)}
.panel-toggle{background:rgba(255,255,255,0.25);border:none;cursor:pointer;font-size:16px;padding:4px 7px;line-height:1;border-radius:var(--radius-md);color:#fff;flex-shrink:0}
.panel-toggle:hover{background:rgba(255,255,255,0.45)}
.panel-delete-btn{background:rgba(255,255,255,0.15);border:none;cursor:pointer;font-size:12px;padding:4px 8px;line-height:1;border-radius:var(--radius-md);color:#fff;flex-shrink:0;display:none;align-items:center;gap:3px}
.panel-delete-btn:hover{background:rgba(163,45,45,0.6)}
.panel.archived .panel-delete-btn{display:flex}
.panel-body{padding:var(--pad);background:var(--color-surface);border:0.5px solid var(--color-border);border-top:none;border-radius:0 0 var(--radius-lg) var(--radius-lg)}
.panel-toolbar{display:flex;align-items:center;gap:var(--gap);margin-bottom:10px}
.panel-tool-btn{display:flex;align-items:center;gap:4px;font-size:12px;padding:4px 10px;border:0.5px solid var(--color-border2);border-radius:var(--radius-md);background:var(--color-bg2);color:var(--color-text2);cursor:pointer;white-space:nowrap}
.panel-tool-btn:hover{background:var(--color-bg3)}
.panel-tool-btn.collapsed-mode{background:#EEEDFE;border-color:#AFA9EC;color:#3C3489}
.add-task-row{display:flex;gap:var(--gap);margin-bottom:10px;align-items:center}
.cat-select-btn{font-size:12px;padding:7px 10px;border:0.5px solid var(--color-border2);border-radius:var(--radius-md);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px;flex-shrink:0}
.cat-select-btn:hover{filter:brightness(0.93)}
.add-task-row input[type=text]{flex:1;min-width:80px;font-size:14px;padding:7px 10px;border:0.5px solid var(--color-border2);border-radius:var(--radius-md);background:var(--color-surface);color:var(--color-text)}
.add-btn{padding:7px 14px;border:none;border-radius:var(--radius-md);background:var(--color-accent);color:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:4px;white-space:nowrap;font-weight:500;flex-shrink:0}
.add-btn:hover{background:var(--color-accent2)}
.tasks-list{display:flex;flex-direction:column;gap:6px}
.task-item{border-radius:var(--radius-md);overflow:visible;border:0.5px solid var(--color-border);background:var(--color-bg2);transition:box-shadow 0.15s}
.task-item.done{background:var(--color-bg);border-color:transparent}
.task-item.selected{border-color:var(--color-accent);box-shadow:0 0 0 2px rgba(24,95,165,0.15)}
.task-item.filtered-out{display:none}
.task-item.drag-over-task{border-color:var(--color-accent);border-style:dashed;background:var(--color-bg3)}
.task-item.dragging-task{opacity:0.4}
.task-row{display:flex;align-items:center;gap:7px;padding:9px 10px}
.task-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--color-border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;background:var(--color-surface);transition:all 0.15s}
.task-check.checked{background:#1D9E75;border-color:#1D9E75;color:#fff}
.task-text{flex:1;font-size:14px;color:var(--color-text);word-break:break-word;min-width:0;line-height:1.4;cursor:pointer;padding:1px 3px;border-radius:4px}
.task-text:hover{background:rgba(24,95,165,0.06)}
.task-item.done .task-text{text-decoration:line-through;color:#5DCAA5;font-style:italic}
.cat-pill{font-size:11px;padding:3px 8px;border-radius:var(--radius-md);font-weight:500;flex-shrink:0;white-space:nowrap;cursor:pointer;border:0.5px solid transparent;transition:filter 0.15s}
.cat-pill:hover{filter:brightness(0.88)}
.task-edit-btn{background:none;border:none;cursor:pointer;color:var(--color-text3);font-size:14px;padding:3px;line-height:1;flex-shrink:0;opacity:0.55;border-radius:4px}
.task-edit-btn:hover{opacity:1;color:var(--color-accent)}
.sub-toggle-btn{display:flex;align-items:center;font-size:11px;font-weight:600;padding:3px 8px;border-radius:var(--radius-md);border:0.5px solid #6A9FD8;background:#C8DFF5;color:#0C447C;cursor:pointer;white-space:nowrap;flex-shrink:0}
.sub-toggle-btn:hover{background:#A8C8EC}
.sub-toggle-btn.has-subs{background:#AFA9EC;border-color:#7F77DD;color:#1E1870}
.del-btn{background:none;border:none;cursor:pointer;color:var(--color-text3);font-size:15px;padding:3px;line-height:1;flex-shrink:0;opacity:0.5;border-radius:4px}
.del-btn:hover{color:#A32D2D;opacity:1}
.task-drag-handle{color:var(--color-text3);font-size:16px;flex-shrink:0;cursor:grab;opacity:0.5;display:none;padding:2px}
.task-drag-handle:hover{opacity:1}
.collapsed-mode-active .task-drag-handle{display:flex;align-items:center}
.collapsed-mode-active .sub-toggle-btn{display:none}
.collapsed-mode-active .subtasks{display:none}
.collapsed-mode-active .task-edit-popup{display:none}
.task-edit-popup{padding:10px 10px 6px;background:var(--color-bg2);border-top:0.5px solid var(--color-border);display:none}
.task-edit-popup.open{display:block}
.task-edit-popup input[type=text]{width:100%;font-size:13px;padding:6px 8px;border:0.5px solid var(--color-border2);border-radius:var(--radius-md);background:var(--color-surface);color:var(--color-text);margin-bottom:6px}
.task-edit-popup-cats{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.task-edit-cat-opt{font-size:11px;padding:3px 9px;border-radius:var(--radius-md);font-weight:500;cursor:pointer;border:0.5px solid transparent}
.task-edit-cat-opt:hover{filter:brightness(0.88)}
.task-edit-cat-opt.selected-cat{border-width:1.5px;box-shadow:0 0 0 1px currentColor}
.task-edit-popup-actions{display:flex;gap:6px;justify-content:flex-end}
.task-edit-save{font-size:12px;padding:4px 12px;border:none;border-radius:var(--radius-md);background:var(--color-accent);color:#fff;cursor:pointer;font-weight:500}
.task-edit-cancel{font-size:12px;padding:4px 10px;border:0.5px solid var(--color-border2);border-radius:var(--radius-md);background:var(--color-surface);color:var(--color-text2);cursor:pointer}
.subtasks{padding:6px 10px 8px 38px;display:flex;flex-direction:column;gap:4px;border-top:0.5px solid var(--color-border);background:var(--color-bg);border-radius:0 0 var(--radius-md) var(--radius-md)}
.subtask-row{display:flex;align-items:center;gap:7px}
.subtask-check{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--color-border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;background:var(--color-surface)}
.subtask-check.checked{background:#5DCAA5;border-color:#5DCAA5;color:#fff}
.subtask-text{flex:1;font-size:13px;color:var(--color-text2);word-break:break-word}
.subtask-text.done{text-decoration:line-through;color:#9FE1CB}
.subtask-del{background:none;border:none;cursor:pointer;color:var(--color-text3);font-size:13px;padding:1px;opacity:0.5}
.subtask-del:hover{opacity:1;color:#A32D2D}
.add-subtask-row{display:flex;gap:5px;margin-top:6px}
.add-subtask-row input{flex:1;font-size:12px;padding:4px 8px;border:0.5px solid var(--color-border2);border-radius:var(--radius-md);background:var(--color-surface);color:var(--color-text);min-width:0}
.add-subtask-btn{font-size:12px;padding:4px 10px;border:none;border-radius:var(--radius-md);background:#5DCAA5;color:#085041;cursor:pointer;font-weight:500;white-space:nowrap}
.add-subtask-btn:hover{background:#1D9E75;color:#fff}
.sub-count{font-size:11px;color:var(--color-text3);margin-top:3px}
.cat-picker-overlay{position:fixed;z-index:1000;background:var(--color-surface);border:0.5px solid var(--color-border2);border-radius:var(--radius-md);padding:6px;display:flex;flex-direction:column;gap:3px;box-shadow:0 4px 20px rgba(24,95,165,0.18);min-width:160px}
.cat-picker-option{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:var(--radius-md);cursor:pointer;font-size:13px;font-weight:500;color:var(--color-text)}
.cat-picker-option:hover{background:var(--color-bg2)}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cats-popup-overlay{position:fixed;inset:0;background:rgba(12,68,124,0.25);z-index:500;display:none;align-items:flex-end;justify-content:center}
.cats-popup-overlay.open{display:flex}
.cats-popup{background:var(--color-surface);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:var(--pad);width:100%;max-width:720px;max-height:80vh;overflow-y:auto;border:0.5px solid var(--color-border)}
.cats-popup-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cats-popup-title{font-size:14px;font-weight:500;color:var(--color-text)}
.cats-popup-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--color-text3);line-height:1;padding:2px}
.cat-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.cat-tag{display:flex;align-items:center;gap:4px;font-size:12px;padding:4px 10px;border-radius:var(--radius-md);font-weight:500;border:0.5px solid transparent;cursor:pointer}
.cat-tag:hover{filter:brightness(0.92)}
.cat-tag.filtering{box-shadow:0 0 0 2px var(--color-accent)}
.cat-tag-name{border-bottom:1px dashed transparent}
.cat-tag-name:hover{border-bottom-color:currentColor}
.cat-tag-input{font-size:12px;font-weight:500;width:80px;border:none;border-bottom:1.5px solid currentColor;background:transparent;color:inherit;outline:none;padding:0}
.cat-del{background:none;border:none;cursor:pointer;font-size:11px;padding:0;line-height:1;opacity:0.6}
.cat-del:hover{opacity:1}
.add-cat-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.add-cat-row input[type=text]{font-size:12px;padding:4px 8px;border:0.5px solid var(--color-border2);border-radius:var(--radius-md);background:var(--color-surface);color:var(--color-text);flex:1;min-width:80px}
.add-cat-row button{font-size:12px;padding:6px 12px;border:none;border-radius:var(--radius-md);background:var(--color-accent);color:#fff;cursor:pointer;display:flex;align-items:center;gap:3px;font-weight:500;white-space:nowrap}
.cats-trigger-btn{display:flex;align-items:center;gap:4px;font-size:12px;padding:5px 10px;border:0.5px solid var(--color-border2);border-radius:var(--radius-md);background:var(--color-bg2);color:var(--color-text2);cursor:pointer;margin-top:10px}
.cats-trigger-btn:hover{background:var(--color-bg3)}
.collapsed .panel-body{display:none}
.empty-state{font-size:13px;color:var(--color-text3);text-align:center;padding:16px 0;font-style:italic}
.focus-header{padding:12px var(--pad);border-bottom:0.5px solid var(--color-border);background:linear-gradient(135deg,#EDF5FC,#E0EEF8);display:flex;align-items:center;gap:8px;flex-shrink:0}
.focus-header-title{font-size:13px;font-weight:500;color:var(--color-text2);flex:1;min-width:0}
.focus-close-btn{background:none;border:none;cursor:pointer;color:var(--color-text3);font-size:18px;line-height:1;padding:2px;border-radius:4px}
.focus-close-btn:hover{color:var(--color-text);background:var(--color-bg3)}
.focus-body{flex:1;overflow-y:auto;padding:var(--pad);display:flex;flex-direction:column;gap:12px}
.focus-task-name{font-size:18px;font-weight:500;color:var(--color-text);border:none;border-bottom:2px solid var(--color-border);background:transparent;width:100%;padding:4px 2px;outline:none;line-height:1.4}
.focus-task-name:focus{border-bottom-color:var(--color-accent)}
.focus-cat-label{font-size:11px;color:var(--color-text3);font-weight:500;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.04em}
.focus-cats{display:flex;flex-wrap:wrap;gap:5px}
.focus-cat-opt{font-size:12px;padding:4px 10px;border-radius:var(--radius-md);font-weight:500;cursor:pointer;border:0.5px solid transparent}
.focus-cat-opt:hover{filter:brightness(0.88)}
.focus-cat-opt.active{border-width:2px;box-shadow:0 0 0 1px rgba(24,95,165,0.3)}
.focus-subs-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.focus-subs-title{font-size:12px;font-weight:500;color:var(--color-text2)}
.focus-progress{font-size:11px;color:var(--color-text3)}
.focus-progress-bar{height:4px;background:var(--color-bg3);border-radius:2px;margin-bottom:10px;overflow:hidden}
.focus-progress-fill{height:100%;background:#1D9E75;border-radius:2px;transition:width 0.3s}
.focus-sub-list{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.focus-sub-row{display:flex;align-items:center;gap:8px;padding:7px 8px;background:var(--color-bg2);border-radius:var(--radius-md);border:0.5px solid var(--color-border);cursor:grab;user-select:none}
.focus-sub-row.dragging{opacity:0.4}
.focus-sub-row.drag-over{border-color:var(--color-accent);background:var(--color-bg3)}
.drag-handle{color:var(--color-text3);font-size:14px;flex-shrink:0;cursor:grab;opacity:0.5}
.drag-handle:hover{opacity:1}
.focus-sub-check{width:16px;height:16px;border-radius:3px;border:1.5px solid var(--color-border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;background:var(--color-surface)}
.focus-sub-check.checked{background:#5DCAA5;border-color:#5DCAA5;color:#fff}
.focus-sub-text{flex:1;font-size:13px;color:var(--color-text);word-break:break-word}
.focus-sub-text.done{text-decoration:line-through;color:#9FE1CB}
.focus-sub-del{background:none;border:none;cursor:pointer;color:var(--color-text3);font-size:13px;padding:1px;opacity:0.4}
.focus-sub-del:hover{opacity:1;color:#A32D2D}
.focus-add-sub{display:flex;gap:6px}
.focus-add-sub input{flex:1;font-size:13px;padding:6px 8px;border:0.5px solid var(--color-border2);border-radius:var(--radius-md);background:var(--color-surface);color:var(--color-text);min-width:0}
.focus-add-sub button{font-size:12px;padding:6px 10px;border:none;border-radius:var(--radius-md);background:#5DCAA5;color:#085041;cursor:pointer;font-weight:500;white-space:nowrap}
.focus-add-sub button:hover{background:#1D9E75;color:#fff}
.focus-notes-label{font-size:11px;color:var(--color-text3);font-weight:500;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.04em;display:flex;align-items:center;justify-content:space-between}
.focus-notes-copy{background:none;border:0.5px solid var(--color-border2);border-radius:var(--radius-md);color:var(--color-text2);font-size:11px;padding:2px 8px;cursor:pointer;display:flex;align-items:center;gap:3px}
.focus-notes-copy:hover{background:var(--color-bg3)}
.focus-notes-area{width:100%;min-height:100px;font-size:13px;padding:8px 10px;border:0.5px solid var(--color-border2);border-radius:var(--radius-md);background:var(--color-surface);color:var(--color-text);resize:vertical;line-height:1.5;font-family:inherit}
.focus-notes-area:focus{outline:none;border-color:var(--color-accent)}
.focus-empty{font-size:13px;color:var(--color-text3);text-align:center;padding:2rem 1rem;font-style:italic;line-height:1.6}
.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:#1D9E75;color:#fff;padding:8px 18px;border-radius:var(--radius-md);font-size:13px;font-weight:500;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:2000;white-space:nowrap}
.toast.show{opacity:1}
.fab{display:none;position:fixed;bottom:1.5rem;right:1.5rem;z-index:400;width:52px;height:52px;border-radius:50%;background:var(--color-accent);color:#fff;border:none;cursor:pointer;font-size:24px;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(24,95,165,0.35)}
.fab:hover{background:var(--color-accent2)}
@media(max-width:900px){.fab{display:flex}.settings-bar input[type=text]{width:70px}.new-page-btn span{display:none}.panel-body{padding:10px}.data-bar{gap:5px}}
@media(max-width:600px){.add-task-row{flex-wrap:nowrap}}
</style>
</head>
<body>
<div class="app-layout">
  <div class="planner-col" id="top">
    <div class="title-bar">
      <img src="ladybug.png" class="title-bar-icon" alt="Planner">
      <span class="title-bar-name">DAILY PLANNER</span>
      <span class="title-bar-date" id="title-date"></span>
      <span class="title-bar-spacer"></span>
      <span class="title-bar-save" id="last-saved"></span>
    </div>
    <div class="settings-bar">
      <label>User</label>
      <input type="text" id="username" value="Ric" placeholder="Your name">
      <label>Page lasts</label>
      <select id="page-duration">
        <option value="1">1 day</option>
        <option value="2">2 days</option>
        <option value="3" selected>3 days</option>
        <option value="5">5 days</option>
        <option value="7">1 week</option>
      </select>
      <button class="new-page-btn" onclick="newPage()"><i class="ti ti-plus"></i> <span>New page</span></button>
      <button class="split-toggle" id="split-toggle" onclick="toggleSplit()"><i class="ti ti-layout-sidebar-right"></i> Focus</button>
    </div>
    <div class="sync-bar">
      <span class="sync-dot" id="sync-dot"></span>
      <span id="sync-status">Connecting…</span>
      <button class="data-btn sync" style="margin-left:auto" onclick="syncNow()"><i class="ti ti-refresh" style="font-size:13px"></i> Sync now</button>
    </div>
    <div class="data-bar">
      <span class="data-bar-label"><i class="ti ti-database" style="font-size:13px;vertical-align:-1px"></i> Data</span>
      <button class="data-btn export" onclick="exportData()"><i class="ti ti-download" style="font-size:13px"></i> Export</button>
      <button class="data-btn import" onclick="document.getElementById('import-file').click()"><i class="ti ti-upload" style="font-size:13px"></i> Import</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
      <button class="data-btn clear" onclick="clearData()"><i class="ti ti-trash" style="font-size:13px"></i> Clear all</button>
    </div>
    <div class="filter-bar" id="filter-bar">
      <span class="filter-bar-dot" id="filter-bar-dot"></span>
      <span id="filter-bar-label">Filtering by category</span>
      <button class="clear-filter-btn" onclick="clearFilter()"><i class="ti ti-x" style="font-size:11px"></i> Clear filter</button>
    </div>
    <div class="panels-container" id="panels"></div>
  </div>
  <div class="focus-col" id="focus-col">
    <div class="focus-header">
      <i class="ti ti-focus-2" style="font-size:16px;color:var(--color-text3)"></i>
      <span class="focus-header-title" id="focus-header-title">Select a task to focus</span>
      <button class="focus-close-btn" onclick="closeFocus()"><i class="ti ti-x"></i></button>
    </div>
    <div class="focus-body" id="focus-body">
      <div class="focus-empty">Click any task to open it here for detailed editing, subtask management, and notes.</div>
    </div>
  </div>
</div>
<div class="cats-popup-overlay" id="cats-overlay" onclick="closeCatsPopup(event)">
  <div class="cats-popup">
    <div class="cats-popup-header">
      <span class="cats-popup-title"><i class="ti ti-palette" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i> Manage categories <span style="font-size:11px;color:var(--color-text3);font-weight:400">— click to filter</span></span>
      <button class="cats-popup-close" onclick="closeCatsPopupDirect()">&times;</button>
    </div>
    <div class="cat-tags" id="cat-tags-list"></div>
    <div class="add-cat-row">
      <input type="text" id="nc-name" placeholder="New category name" onkeydown="if(event.key==='Enter')addCat()">
      <button onclick="addCat()"><i class="ti ti-plus"></i> Add</button>
    </div>
  </div>
</div>
<button class="fab" onclick="scrollToTop()"><i class="ti ti-keyboard"></i></button>
<div class="toast" id="toast"></div>
<script>
const SHEETS_URL='https://script.google.com/macros/s/AKfycby9CXh1-_7q0KP7WIkc1HwUJmP_HZJSCguKnHDwuY4QyZEdfFMKFthZZoG14ASAzAlCKA/exec';
const PANEL_GRADIENTS=['linear-gradient(135deg,#185FA5,#0F6E56)','linear-gradient(135deg,#0C447C,#185FA5)','linear-gradient(135deg,#0F6E56,#185FA5)','linear-gradient(135deg,#185FA5,#534AB7)','linear-gradient(135deg,#378ADD,#1D9E75)','linear-gradient(135deg,#0C447C,#0F6E56)'];
const CAT_PALETTE=['#E24B4A','#D85A30','#BA7517','#97C459','#1D9E75','#378ADD','#185FA5','#534AB7','#7F77DD','#993556','#D4537E','#993C1D'];
let state={panels:[],cats:[{id:'c1',name:'Today',color:'#378ADD'}],nextId:2,gradIdx:0,catColorIdx:1};
let activePicker=null,syncTimer=null,activeFilter=null,focusPid=null,focusTid=null,splitOpen=false,dragSrc=null,panelCollapsedAll={},taskDragSrc=null,taskDragPid=null;

function updateTitleDate(){const el=document.getElementById('title-date');if(el)el.textContent=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function scrollToTop(){document.getElementById('top').scrollIntoView({behavior:'smooth'});setTimeout(()=>{const p=state.panels.find(p=>!p.archived);if(p){const i=document.getElementById('ti-'+p.id);if(i)i.focus();}},400);}
function toggleSplit(){splitOpen=!splitOpen;document.getElementById('focus-col').classList.toggle('open',splitOpen);document.getElementById('split-toggle').classList.toggle('active',splitOpen);}
function closeFocus(){splitOpen=false;focusPid=null;focusTid=null;document.getElementById('focus-col').classList.remove('open');document.getElementById('split-toggle').classList.remove('active');document.querySelectorAll('.task-item.selected').forEach(el=>el.classList.remove('selected'));}
function setSyncStatus(s,m){document.getElementById('sync-dot').className='sync-dot '+s;document.getElementById('sync-status').textContent=m;}
async function pushToSheets(){
  setSyncStatus('syncing','Saving…');
  try{
    await fetch(SHEETS_URL,{method:'POST',body:JSON.stringify([['__STATE__',JSON.stringify(state)]])});
    const now=new Date();
    setSyncStatus('synced','Synced '+now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}));
    const el=document.getElementById('last-saved');if(el)el.textContent='Saved '+now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  }catch(e){setSyncStatus('error','Sync failed — saved locally');}
}
async function pullFromSheets(){
  setSyncStatus('syncing','Loading…');
  try{
    const resp=await fetch(SHEETS_URL+'?t='+Date.now());
    const rows=await resp.json();
    const row=rows.find(r=>r[0]==='__STATE__');
    if(row&&row[1]){const r=JSON.parse(row[1]);if(r&&r.panels){state=r;if(!state.catColorIdx)state.catColorIdx=1;saveLocal();render();setSyncStatus('synced','Loaded from Sheets');return true;}}
    setSyncStatus('synced','No cloud data — pushing local');await pushToSheets();return false;
  }catch(e){setSyncStatus('error','Offline — using local data');return false;}
}
function save(){saveLocal();clearTimeout(syncTimer);syncTimer=setTimeout(pushToSheets,2000);}
function saveLocal(){try{localStorage.setItem('lcvp5',JSON.stringify(state));}catch(e){}}
function syncNow(){clearTimeout(syncTimer);pullFromSheets();}
function load(){try{const d=localStorage.getItem('lcvp5');if(d){state=JSON.parse(d);if(!state.catColorIdx)state.catColorIdx=1;}}catch(e){}}
function autoExport(){
  if(!state.panels.some(p=>p.tasks.length>0))return;
  try{
    const b=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(b);
    a.download='planner-auto-'+new Date().toISOString().slice(0,10)+'.json';a.click();
    toast('Auto-backup saved to downloads');
  }catch(e){}
}
function exportData(){const b=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='planner-'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('Exported');}
function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const i=JSON.parse(ev.target.result);if(!i.panels||!i.cats)throw 0;state=i;if(!state.catColorIdx)state.catColorIdx=1;save();render();toast('Imported');}catch(x){toast('Import failed','#A32D2D');}e.target.value='';};r.readAsText(f);}
function clearData(){if(!confirm('Clear ALL planner data? This cannot be undone.'))return;state={panels:[],cats:[{id:'c1',name:'Today',color:'#378ADD'}],nextId:2,gradIdx:0,catColorIdx:1};save();render();toast('Cleared','#854F0B');}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):s;}
function toast(msg,col){const t=document.getElementById('toast');t.textContent=msg;t.style.background=col||'#1D9E75';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function fmt(iso){return new Date(iso).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function catStyle(catId){
  const c=state.cats.find(x=>x.id===catId)||state.cats[0];
  if(!c)return{bg:'#eee',text:'#555',border:'#bbb',name:'?',dot:'#999'};
  const h=c.color,r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  const lum=0.299*r+0.587*g+0.114*b;
  return{bg:'rgba('+r+','+g+','+b+',0.15)',text:lum>160?'rgb('+Math.max(0,r-80)+','+Math.max(0,g-80)+','+Math.max(0,b-80)+')':h,border:'rgba('+r+','+g+','+b+',0.45)',name:c.name,dot:h};
}
function setFilter(catId){if(activeFilter===catId){clearFilter();return;}activeFilter=catId;const cs=catStyle(catId);document.getElementById('filter-bar-dot').style.background=cs.dot;document.getElementById('filter-bar-label').textContent='Filtering by: '+cs.name;document.getElementById('filter-bar').classList.add('show');applyFilter();renderCatTags();}
function clearFilter(){activeFilter=null;document.getElementById('filter-bar').classList.remove('show');applyFilter();renderCatTags();}
function applyFilter(){document.querySelectorAll('.task-item[data-catid]').forEach(el=>{if(activeFilter&&el.dataset.catid!==activeFilter)el.classList.add('filtered-out');else el.classList.remove('filtered-out');});}
function toggleCollapseAll(pid){
  const panel=state.panels.find(p=>p.id===pid);if(!panel)return;
  const isCollapsed=panelCollapsedAll[pid];
  panelCollapsedAll[pid]=!isCollapsed;
  panel.tasks.forEach(t=>{t.showSubs=isCollapsed;});
  save();renderTasksOnly(pid);
  const btn=document.getElementById('collapse-btn-'+pid);
  if(btn){const nowCollapsed=!isCollapsed;btn.innerHTML='<i class="ti ti-'+(nowCollapsed?'chevrons-down':'chevrons-up')+'"></i> '+(nowCollapsed?'Expand all':'Collapse all');btn.classList.toggle('collapsed-mode',nowCollapsed);const tl=document.getElementById('tl-'+pid);if(tl)tl.classList.toggle('collapsed-mode-active',nowCollapsed);}
}
function deletePanel(pid){if(!confirm('Delete this archived page permanently? This cannot be undone.'))return;state.panels=state.panels.filter(p=>p.id!==pid);save();render();toast('Archive deleted','#854F0B');}
function newPage(){
  const user=cap(document.getElementById('username').value||'User');
  const grad=PANEL_GRADIENTS[state.gradIdx%PANEL_GRADIENTS.length];
  state.gradIdx=(state.gradIdx+1)%PANEL_GRADIENTS.length;
  const panel={id:state.nextId++,date:new Date().toISOString(),user,tasks:[],collapsed:false,archived:false,grad};
  let n=0;
  if(state.panels.length>0){const prev=state.panels[0];const carried=prev.tasks.filter(t=>!t.done).map(t=>({...t,id:state.nextId++,subtasks:(t.subtasks||[]).map(s=>({...s,id:state.nextId++}))}));panel.tasks=carried;n=carried.length;prev.archived=true;prev.collapsed=true;}
  state.panels.unshift(panel);save();
  setTimeout(()=>autoExport(),1500);
  render();toast('New page — '+n+' tasks carried forward');
}
function addTask(pid){const inp=document.getElementById('ti-'+pid);const text=cap(inp.value.trim());if(!text)return;const catId=document.getElementById('tc-sel-'+pid)?._catId||state.cats[0]?.id;const panel=state.panels.find(p=>p.id===pid);panel.tasks.unshift({id:state.nextId++,text,catId,done:false,subtasks:[],showSubs:false,notes:''});inp.value='';save();renderTasksOnly(pid);document.getElementById('ti-'+pid)?.focus();}
function renderTasksOnly(pid){const panel=state.panels.find(p=>p.id===pid);const container=document.getElementById('tl-'+pid);if(!container)return render();const isCollapsed=panelCollapsedAll[pid];container.innerHTML=panel.tasks.length===0?'<div class="empty-state">No tasks yet — type above and press Enter.</div>':panel.tasks.map(t=>renderTask(panel,t)).join('');if(isCollapsed)container.classList.add('collapsed-mode-active');else container.classList.remove('collapsed-mode-active');applyFilter();}
function toggleTask(pid,tid){const t=state.panels.find(p=>p.id===pid).tasks.find(t=>t.id===tid);t.done=!t.done;save();renderTasksOnly(pid);if(focusTid===tid)renderFocus();}
function deleteTask(pid,tid){const p=state.panels.find(p=>p.id===pid);p.tasks=p.tasks.filter(t=>t.id!==tid);if(focusTid===tid){focusPid=null;focusTid=null;renderFocus();}save();renderTasksOnly(pid);}
function openEditPopup(pid,tid){const popupEl=document.getElementById('ep-'+tid);if(!popupEl)return;if(popupEl.classList.contains('open')){popupEl.classList.remove('open');return;}const t=state.panels.find(p=>p.id===pid).tasks.find(t=>t.id===tid);document.getElementById('ep-name-'+tid).value=t.text;const catsEl=document.getElementById('ep-cats-'+tid);catsEl.innerHTML=state.cats.map(c=>{const cs=catStyle(c.id);return'<span class="task-edit-cat-opt'+(c.id===t.catId?' selected-cat':'')+'" data-catid="'+c.id+'" style="background:'+cs.bg+';color:'+cs.text+';border-color:'+cs.border+'" onclick="selectEditCat(''+tid+'',''+c.id+'')">'+c.name+'</span>';}).join('');popupEl.classList.add('open');document.getElementById('ep-name-'+tid).focus();}
function selectEditCat(tid,catId){document.querySelectorAll('#ep-cats-'+tid+' .task-edit-cat-opt').forEach(el=>el.classList.toggle('selected-cat',el.dataset.catid===catId));}
function saveEditPopup(pid,tid){const t=state.panels.find(p=>p.id===pid).tasks.find(t=>t.id===tid);const v=document.getElementById('ep-name-'+tid).value.trim();if(v)t.text=cap(v);const sel=document.querySelector('#ep-cats-'+tid+' .selected-cat');if(sel)t.catId=sel.dataset.catid;document.getElementById('ep-'+tid).classList.remove('open');save();renderTasksOnly(pid);if(focusTid===tid)renderFocus();}
function cancelEditPopup(tid){document.getElementById('ep-'+tid).classList.remove('open');}
function clickCatPill(catId,event){event.stopPropagation();setFilter(catId);}
function toggleSubs(pid,tid){const t=state.panels.find(p=>p.id===pid).tasks.find(t=>t.id===tid);t.showSubs=!t.showSubs;save();renderTasksOnly(pid);}
function addSubtask(pid,tid){const inp=document.getElementById('si-'+tid);const text=cap(inp.value.trim());if(!text)return;const t=state.panels.find(p=>p.id===pid).tasks.find(t=>t.id===tid);t.subtasks.push({id:state.nextId++,text,done:false});inp.value='';save();renderTasksOnly(pid);if(focusTid===tid)renderFocus();document.getElementById('si-'+tid)?.focus();}
function toggleSub(pid,tid,sid){const t=state.panels.find(p=>p.id===pid).tasks.find(t=>t.id===tid);const s=t.subtasks.find(s=>s.id===sid);s.done=!s.done;save();renderTasksOnly(pid);if(focusTid===tid)renderFocus();}
function deleteSub(pid,tid,sid){const t=state.panels.find(p=>p.id===pid).tasks.find(t=>t.id===tid);t.subtasks=t.subtasks.filter(s=>s.id!==sid);save();renderTasksOnly(pid);if(focusTid===tid)renderFocus();}
function togglePanel(pid){const p=state.panels.find(p=>p.id===pid);p.collapsed=!p.collapsed;save();render();}
function taskDragStart(e,pid,tid){taskDragSrc=tid;taskDragPid=pid;e.currentTarget.classList.add('dragging-task');e.dataTransfer.effectAllowed='move';}
function taskDragOver(e,tid){e.preventDefault();document.querySelectorAll('.task-item').forEach(el=>el.classList.toggle('drag-over-task',el.id==='tk-'+tid&&tid!==taskDragSrc));}
function taskDrop(e,pid,tid){e.preventDefault();if(!taskDragSrc||taskDragSrc===tid)return;const panel=state.panels.find(p=>p.id===pid);if(!panel)return;const tasks=[...panel.tasks];const srcIdx=tasks.findIndex(t=>t.id===taskDragSrc);const tgtIdx=tasks.findIndex(t=>t.id===tid);if(srcIdx<0||tgtIdx<0)return;const[moved]=tasks.splice(srcIdx,1);tasks.splice(tgtIdx,0,moved);panel.tasks=tasks;save();renderTasksOnly(pid);taskDragSrc=null;taskDragPid=null;}
function taskDragEnd(){taskDragSrc=null;taskDragPid=null;document.querySelectorAll('.task-item').forEach(el=>el.classList.remove('dragging-task','drag-over-task'));}
function closePicker(){if(activePicker){activePicker.remove();activePicker=null;}}
function showPicker(items,anchorEl,onSelect){closePicker();const rect=anchorEl.getBoundingClientRect();const div=document.createElement('div');div.className='cat-picker-overlay';div.style.top=(rect.bottom+window.scrollY+4)+'px';div.style.left=(rect.left+window.scrollX)+'px';items.forEach(c=>{const opt=document.createElement('div');opt.className='cat-picker-option';opt.innerHTML='<span class="cat-dot" style="background:'+c.color+'"></span>'+c.name;opt.onclick=e=>{e.stopPropagation();onSelect(c.id);};div.appendChild(opt);});document.body.appendChild(div);activePicker=div;setTimeout(()=>document.addEventListener('click',closePicker,{once:true}),10);}
function showAddCatPicker(pid,btnEl){showPicker(state.cats,btnEl,(catId)=>{const b=document.getElementById('tc-sel-'+pid);if(b){b._catId=catId;const cs=catStyle(catId);b.style.background=cs.bg;b.style.color=cs.text;b.style.borderColor=cs.border;b.querySelector('span').textContent=cs.name;}closePicker();document.getElementById('ti-'+pid)?.focus();});}
function openCatsPopup(){renderCatTags();document.getElementById('cats-overlay').classList.add('open');}
function closeCatsPopup(e){if(e.target===document.getElementById('cats-overlay'))closeCatsPopupDirect();}
function closeCatsPopupDirect(){document.getElementById('cats-overlay').classList.remove('open');}
function renderCatTags(){document.getElementById('cat-tags-list').innerHTML=state.cats.map(c=>{const cs=catStyle(c.id);return'<div class="cat-tag'+(activeFilter===c.id?' filtering':'')+'" style="background:'+cs.bg+';color:'+cs.text+';border-color:'+cs.border+'" onclick="setFilter(''+c.id+'')">'+'<span class="cat-dot" style="background:'+c.color+'"></span>'+'<span class="cat-tag-name" id="cpname-'+c.id+'" onclick="startRename(event,''+c.id+'')" style="color:'+cs.text+'" title="Click to rename">'+c.name+'</span>'+(state.cats.length>1?'<button class="cat-del" onclick="deleteCat(event,''+c.id+'')">&#x2715;</button>':'')+'</div>';}).join('');}
function startRename(e,catId){e.stopPropagation();const span=document.getElementById('cpname-'+catId);const cat=state.cats.find(c=>c.id===catId);if(!span||!cat)return;const inp=document.createElement('input');inp.className='cat-tag-input';inp.value=cat.name;inp.style.color=span.style.color;inp.onblur=()=>{if(inp.value.trim())cat.name=cap(inp.value.trim());save();renderCatTags();render();};inp.onkeydown=e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=cat.name;inp.blur();}};inp.onclick=e=>e.stopPropagation();span.replaceWith(inp);inp.focus();inp.select();}
function deleteCat(e,catId){e.stopPropagation();if(state.cats.length<=1){toast('Cannot delete last category','#854F0B');return;}if(!confirm('Delete this category?'))return;state.cats=state.cats.filter(c=>c.id!==catId);if(activeFilter===catId)clearFilter();save();renderCatTags();render();}
function addCat(){const inp=document.getElementById('nc-name');const name=cap(inp.value.trim());if(!name)return;const color=CAT_PALETTE[state.catColorIdx%CAT_PALETTE.length];state.catColorIdx=(state.catColorIdx+1)%CAT_PALETTE.length;state.cats.push({id:'c'+state.nextId++,name,color});inp.value='';save();renderCatTags();render();toast('Category added');}
function openFocus(pid,tid){focusPid=pid;focusTid=tid;if(!splitOpen)toggleSplit();document.querySelectorAll('.task-item.selected').forEach(el=>el.classList.remove('selected'));const el=document.getElementById('tk-'+tid);if(el)el.classList.add('selected');renderFocus();}
function renderFocus(){
  const body=document.getElementById('focus-body');const header=document.getElementById('focus-header-title');
  if(!focusPid||!focusTid){header.textContent='Select a task to focus';body.innerHTML='<div class="focus-empty">Click any task to open it here for detailed editing, subtask management, and notes.</div>';return;}
  const panel=state.panels.find(p=>p.id===focusPid);const task=panel?.tasks.find(t=>t.id===focusTid);
  if(!task){body.innerHTML='<div class="focus-empty">Task not found.</div>';return;}
  const subs=task.subtasks||[];const subDone=subs.filter(s=>s.done).length;const pct=subs.length>0?Math.round(subDone/subs.length*100):0;
  header.textContent=task.text.length>30?task.text.slice(0,30)+'…':task.text;if(!task.notes)task.notes='';
  body.innerHTML='<div><input class="focus-task-name" id="fn-'+task.id+'" value="'+escHtml(task.text)+'" placeholder="Task name" onchange="saveFocusName()"></div>'
    +'<div><div class="focus-cat-label">Category</div><div class="focus-cats">'+state.cats.map(c=>{const s=catStyle(c.id);return'<span class="focus-cat-opt'+(c.id===task.catId?' active':'')+'" style="background:'+s.bg+';color:'+s.text+';border-color:'+s.border+'" onclick="setFocusCat(''+c.id+'')">'+c.name+'</span>';}).join('')+'</div></div>'
    +'<div><div class="focus-subs-header"><span class="focus-subs-title">Subtasks</span><span class="focus-progress">'+subDone+' / '+subs.length+'</span></div>'
    +(subs.length>0?'<div class="focus-progress-bar"><div class="focus-progress-fill" style="width:'+pct+'%"></div></div>':'')
    +'<div class="focus-sub-list">'+subs.map((s,i)=>'<div class="focus-sub-row" draggable="true" ondragstart="dragStart(event,'+i+')" ondragover="dragOver(event,'+i+')" ondrop="dropSub(event,'+i+')" ondragend="dragEnd()"><span class="drag-handle"><i class="ti ti-grip-vertical"></i></span><div class="focus-sub-check'+(s.done?' checked':'')+'" onclick="focusToggleSub('+s.id+')">'+(s.done?'<i class="ti ti-check"></i>':'')+'</div><span class="focus-sub-text'+(s.done?' done':'')+'">'+escHtml(s.text)+'</span><button class="focus-sub-del" onclick="focusDeleteSub('+s.id+')"><i class="ti ti-x"></i></button></div>').join('')+'</div>'
    +'<div class="focus-add-sub"><input type="text" id="focus-sub-inp" placeholder="Add subtask…" onkeydown="if(event.key==='Enter')focusAddSub()"><button onclick="focusAddSub()"><i class="ti ti-plus"></i> Add</button></div></div>'
    +'<div><div class="focus-notes-label">Notes <button class="focus-notes-copy" onclick="copyNotes()"><i class="ti ti-copy" style="font-size:11px"></i> Copy</button></div>'
    +'<textarea class="focus-notes-area" id="focus-notes" placeholder="Notes, links, text to copy across devices…" onchange="saveFocusNotes()">'+escHtml(task.notes||'')+'</textarea></div>';
}
function saveFocusName(){const inp=document.getElementById('fn-'+focusTid);if(!inp)return;const val=inp.value.trim();if(!val)return;const task=state.panels.find(p=>p.id===focusPid)?.tasks.find(t=>t.id===focusTid);if(task){task.text=cap(val);save();renderTasksOnly(focusPid);document.getElementById('focus-header-title').textContent=val.length>30?val.slice(0,30)+'…':val;}}
function setFocusCat(catId){const task=state.panels.find(p=>p.id===focusPid)?.tasks.find(t=>t.id===focusTid);if(task){task.catId=catId;save();renderTasksOnly(focusPid);renderFocus();}}
function focusToggleSub(sid){const task=state.panels.find(p=>p.id===focusPid)?.tasks.find(t=>t.id===focusTid);if(!task)return;const s=task.subtasks.find(s=>s.id===sid);if(s)s.done=!s.done;save();renderTasksOnly(focusPid);renderFocus();}
function focusDeleteSub(sid){const task=state.panels.find(p=>p.id===focusPid)?.tasks.find(t=>t.id===focusTid);if(!task)return;task.subtasks=task.subtasks.filter(s=>s.id!==sid);save();renderTasksOnly(focusPid);renderFocus();}
function focusAddSub(){const inp=document.getElementById('focus-sub-inp');const text=cap(inp.value.trim());if(!text)return;const task=state.panels.find(p=>p.id===focusPid)?.tasks.find(t=>t.id===focusTid);if(!task)return;task.subtasks.push({id:state.nextId++,text,done:false});inp.value='';save();renderTasksOnly(focusPid);renderFocus();setTimeout(()=>document.getElementById('focus-sub-inp')?.focus(),50);}
function saveFocusNotes(){const el=document.getElementById('focus-notes');if(!el)return;const task=state.panels.find(p=>p.id===focusPid)?.tasks.find(t=>t.id===focusTid);if(task){task.notes=el.value;save();}}
function copyNotes(){const el=document.getElementById('focus-notes');if(!el)return;navigator.clipboard.writeText(el.value).then(()=>toast('Copied to clipboard')).catch(()=>toast('Could not copy','#A32D2D'));}
function dragStart(e,idx){dragSrc=idx;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function dragOver(e,idx){e.preventDefault();document.querySelectorAll('.focus-sub-row').forEach((el,i)=>el.classList.toggle('drag-over',i===idx&&i!==dragSrc));}
function dropSub(e,idx){e.preventDefault();if(dragSrc===null||dragSrc===idx)return;const task=state.panels.find(p=>p.id===focusPid)?.tasks.find(t=>t.id===focusTid);if(!task)return;const subs=[...task.subtasks];const[moved]=subs.splice(dragSrc,1);subs.splice(idx,0,moved);task.subtasks=subs;save();renderTasksOnly(focusPid);renderFocus();}
function dragEnd(){dragSrc=null;document.querySelectorAll('.focus-sub-row').forEach(el=>el.classList.remove('dragging','drag-over'));}
function renderTask(panel,task){
  const cs=catStyle(task.catId);const done=task.done;const subs=task.subtasks||[];const subDone=subs.filter(s=>s.done).length;const hasSubs=subs.length>0;const isFocused=focusTid===task.id;const isCollapsed=panelCollapsedAll[panel.id];
  let h='<div class="task-item'+(done?' done':'')+(isFocused?' selected':'')+'" id="tk-'+task.id+'" data-catid="'+task.catId+'"'+(isCollapsed?' draggable="true" ondragstart="taskDragStart(event,'+panel.id+','+task.id+')" ondragover="taskDragOver(event,'+task.id+')" ondrop="taskDrop(event,'+panel.id+','+task.id+')" ondragend="taskDragEnd()"':'')+'><div class="task-row">'+'<span class="task-drag-handle"><i class="ti ti-grip-vertical"></i></span>'+'<div class="task-check'+(done?' checked':'')+'" onclick="toggleTask('+panel.id+','+task.id+')">'+(done?'<i class="ti ti-check"></i>':'')+'</div>'+'<span class="task-text" onclick="openFocus('+panel.id+','+task.id+')">'+escHtml(task.text)+'</span>';
  if(!panel.archived){h+='<span class="cat-pill" style="background:'+cs.bg+';color:'+cs.text+';border-color:'+cs.border+'" onclick="clickCatPill(''+task.catId+'',event)">'+cs.name+'</span>'+'<button class="task-edit-btn" onclick="openEditPopup('+panel.id+','+task.id+')" title="Edit"><i class="ti ti-pencil"></i></button>'+'<button class="sub-toggle-btn'+(hasSubs?' has-subs':'')+'" onclick="toggleSubs('+panel.id+','+task.id+')">'+(hasSubs?'Sub '+subDone+'/'+subs.length:'Sub')+'</button>'+'<button class="del-btn" onclick="deleteTask('+panel.id+','+task.id+')"><i class="ti ti-trash"></i></button>';}
  else{h+='<span class="cat-pill" style="background:'+cs.bg+';color:'+cs.text+';border-color:'+cs.border+'">'+cs.name+'</span>';}
  h+='</div>'+'<div class="task-edit-popup" id="ep-'+task.id+'">'+'<input type="text" id="ep-name-'+task.id+'" placeholder="Task name" onkeydown="if(event.key==='Enter')saveEditPopup('+panel.id+','+task.id+')">'+'<div class="task-edit-popup-cats" id="ep-cats-'+task.id+'"></div>'+'<div class="task-edit-popup-actions"><button class="task-edit-cancel" onclick="cancelEditPopup('+task.id+')">Cancel</button><button class="task-edit-save" onclick="saveEditPopup('+panel.id+','+task.id+')">Save</button></div></div>';
  if(task.showSubs||hasSubs){h+='<div class="subtasks">';subs.forEach(s=>{h+='<div class="subtask-row"><div class="subtask-check'+(s.done?' checked':'')+'" onclick="toggleSub('+panel.id+','+task.id+','+s.id+')">'+(s.done?'<i class="ti ti-check"></i>':'')+'</div><span class="subtask-text'+(s.done?' done':'')+'">'+escHtml(s.text)+'</span>'+(!panel.archived?'<button class="subtask-del" onclick="deleteSub('+panel.id+','+task.id+','+s.id+')"><i class="ti ti-x"></i></button>':'')+'</div>';});if(!panel.archived&&task.showSubs){h+='<div class="add-subtask-row"><input type="text" id="si-'+task.id+'" placeholder="Add subtask…" onkeydown="if(event.key==='Enter')addSubtask('+panel.id+','+task.id+')"><button class="add-subtask-btn" onclick="addSubtask('+panel.id+','+task.id+')"><i class="ti ti-plus"></i> Add</button></div>';}if(hasSubs)h+='<div class="sub-count">'+subDone+' of '+subs.length+' subtasks complete</div>';h+='</div>';}
  h+='</div>';return h;
}
function render(){
  const container=document.getElementById('panels');
  if(state.panels.length===0){container.innerHTML='<div class="empty-state" style="padding:2rem 0">Click "New page" to begin.</div>';return;}
  container.innerHTML=state.panels.map(panel=>{
    const done=panel.tasks.filter(t=>t.done).length,total=panel.tasks.length,active=!panel.archived,grad=panel.grad||PANEL_GRADIENTS[0],fc=state.cats[0],fcs=catStyle(fc?.id),isCollapsed=panelCollapsedAll[panel.id];
    return '<div class="panel'+(panel.archived?' archived':'')+(panel.collapsed?' collapsed':'')+'" id="pnl-'+panel.id+'">'
      +'<div class="panel-header" style="background:'+grad+'">'
      +'<span class="panel-date">'+fmt(panel.date)+'</span>'
      +'<span class="panel-user"><i class="ti ti-user" style="font-size:12px"></i> '+panel.user+'</span>'
      +(total>0?'<span class="panel-progress">'+done+'/'+total+' done</span>':'')
      +'<span class="panel-badge '+(active?'badge-active':'badge-arch')+'">'+(active?'active':'archived')+'</span>'
      +(panel.archived?'<button class="panel-delete-btn" onclick="deletePanel('+panel.id+')" title="Delete archive"><i class="ti ti-trash" style="font-size:12px"></i> Delete</button>':'')
      +'<button class="panel-toggle" onclick="togglePanel('+panel.id+')"><i class="ti ti-chevron-'+(panel.collapsed?'down':'up')+'"></i></button>'
      +'</div>'
      +'<div class="panel-body">'
      +(active?'<div class="add-task-row"><button class="cat-select-btn" id="tc-sel-'+panel.id+'" style="background:'+fcs.bg+';color:'+fcs.text+';border-color:'+fcs.border+'" onclick="showAddCatPicker('+panel.id+',this)"><i class="ti ti-tag" style="font-size:13px"></i><span>'+fcs.name+'</span></button><input type="text" id="ti-'+panel.id+'" placeholder="Add a task…" onkeydown="if(event.key==='Enter')addTask('+panel.id+')"><button class="add-btn" onclick="addTask('+panel.id+')"><i class="ti ti-plus"></i> Add</button></div>':'')
      +(active&&total>0?'<div class="panel-toolbar"><button class="panel-tool-btn'+(isCollapsed?' collapsed-mode':'')+'" id="collapse-btn-'+panel.id+'" onclick="toggleCollapseAll('+panel.id+')"><i class="ti ti-'+(isCollapsed?'chevrons-down':'chevrons-up')+'"></i> '+(isCollapsed?'Expand all':'Collapse all')+'</button></div>':'')
      +'<div class="tasks-list'+(isCollapsed?' collapsed-mode-active':'')+'" id="tl-'+panel.id+'">'
      +(panel.tasks.length===0?'<div class="empty-state">No tasks yet'+(active?' — type above and press Enter.':'.')+'</div>':panel.tasks.map(t=>renderTask(panel,t)).join(''))
      +'</div>'
      +(active?'<button class="cats-trigger-btn" onclick="openCatsPopup()"><i class="ti ti-palette" style="font-size:13px"></i> Manage categories</button>':'')
      +'</div></div>';
  }).join('');
  state.panels.forEach(panel=>{const b=document.getElementById('tc-sel-'+panel.id);if(b&&!b._catId)b._catId=state.cats[0]?.id;});
  applyFilter();
}
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
updateTitleDate();
load();render();
pullFromSheets().then(loaded=>{
  if(!loaded&&state.panels.length===0)newPage();
  if(state.panels.some(p=>p.tasks.length>0))setTimeout(()=>autoExport(),2000);
});
</script>
</body>
</html>
